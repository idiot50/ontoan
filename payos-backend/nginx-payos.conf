# Vhost nginx cho backend PayOS — KHÔNG đụng site "default" có sẵn.
# Đặt tại /etc/nginx/sites-available/payos-backend rồi symlink sang sites-enabled.
# certbot --nginx sẽ tự thêm khối listen 443 + chứng chỉ cho hostname này.
server {
    listen 80;
    listen [::]:80;
    server_name 3.104.106.255.sslip.io;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
