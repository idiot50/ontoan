name: Deploy web Toán lớp 3 lên GitHub Pages

# Xuất bản thư mục web_toan_lop3/ làm website tĩnh.
# Mỗi lần push lên main sẽ tự động deploy lại.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ chạy 1 lượt deploy tại một thời điểm
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cấu hình Pages
        uses: actions/configure-pages@v5

      - name: Đóng gói thư mục web_toan_lop3 làm artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web_toan_lop3

      - name: Triển khai lên GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
