name: Deploy web Toán lên GitHub Pages

# Xuất bản trang chủ chọn lớp + 2 ứng dụng (lớp 1, lớp 3) làm website tĩnh.
# Cấu trúc site:  /  (hub)  •  /lop1/  •  /lop3/
# Mỗi lần push lên main sẽ tự động deploy lại.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dựng thư mục site (hub + lớp 1 + lớp 3)
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          [ -f .nojekyll ] && cp .nojekyll _site/.nojekyll || true
          # Asset PWA của trang chủ (hub): manifest + service worker + icon
          cp manifest.webmanifest _site/ 2>/dev/null || true
          cp sw.js _site/ 2>/dev/null || true
          cp -r icons _site/icons
          cp -r web_toan_lop1 _site/lop1
          cp -r web_toan_lop3 _site/lop3
          # Bỏ phần test/dev khỏi bản xuất bản cho gọn (giữ manifest/sw/icons của mỗi app)
          rm -rf _site/lop1/tests _site/lop3/tests
          rm -f  _site/lop1/engine.test.mjs _site/lop3/engine.test.mjs
          ls -R _site | head -60

      - name: Cấu hình Pages
        uses: actions/configure-pages@v5

      - name: Đóng gói _site làm artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Triển khai lên GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
